name: Playwright Reusable Job

on:
  workflow_call:
    inputs:
      summary_title:
        description: "Label shown in GitHub Step Summary"
        required: true
        type: string
      artifact_name:
        description: "Artifact name for uploaded outputs"
        required: true
        type: string
      test_timeout_minutes:
        description: "Timeout for the test execution step"
        required: false
        default: 30
        type: number
      run_command:
        description: "Shell script used to run the target test suite"
        required: true
        type: string
    secrets:
      DEV_API_KEY:
        required: false
      DEV_TEST_USER_EMAIL:
        required: false
      DEV_TEST_USER_PASSWORD:
        required: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      CI: true
      ENV: dev
      LOG_RUN_ID: ${{ github.run_id }}
      API_KEY: ${{ secrets.DEV_API_KEY }}
      TEST_USER_EMAIL: ${{ secrets.DEV_TEST_USER_EMAIL }}
      TEST_USER_PASSWORD: ${{ secrets.DEV_TEST_USER_PASSWORD }}
      BASE_URL: ${{ vars.DEV_BASE_URL }}
      API_BASE_URL: ${{ vars.DEV_API_BASE_URL }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-chromium-${{ runner.os }}-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Create DEV env file (do not print values)
        run: |
          set -euo pipefail
          mkdir -p env
          test -n "${API_BASE_URL:-}" || (echo "Missing DEV_API_BASE_URL (vars) / API_BASE_URL" && exit 2)
          {
            printf 'BASE_URL=%s\n'            "${BASE_URL:-}"
            printf 'API_BASE_URL=%s\n'        "${API_BASE_URL:-}"
            printf 'REQUEST_TIMEOUT=%s\n'     "10000"
            printf 'GLOBAL_TIMEOUT=%s\n'      "30000"
            printf 'RETRY_FAILED_TESTS=%s\n'  "0"
            printf 'MAX_RETRIES=%s\n'         "2"
            printf 'DEBUG_MODE=%s\n'          "false"
            printf 'VERBOSE_LOGGING=%s\n'     "false"
            printf 'API_KEY=%s\n'             "${API_KEY:-}"
            printf 'TEST_USER_EMAIL=%s\n'     "${TEST_USER_EMAIL:-}"
            printf 'TEST_USER_PASSWORD=%s\n'  "${TEST_USER_PASSWORD:-}"
          } > "env/dev.env"
          echo "ENV=$ENV"
          echo "BASE_URL set: $([ -n "${BASE_URL:-}" ] && echo yes || echo no)"
          echo "API_BASE_URL set: $([ -n "${API_BASE_URL:-}" ] && echo yes || echo no)"

      - name: Prepare artifacts folder
        run: mkdir -p artifacts

      - name: Generate BDD specs
        run: |
          set -euo pipefail
          npm run bdd:generate

      - name: Validate generated specs exist
        run: |
          set -euo pipefail
          COUNT="$(find . -type f -name "*.spec.js" | wc -l | tr -d ' ')"
          echo "Found spec files: $COUNT"
          if [ "$COUNT" -eq 0 ]; then
            echo "No *.spec.js files found after bdd:generate."
            exit 3
          fi

      - name: Run tests
        timeout-minutes: ${{ inputs.test_timeout_minutes }}
        run: ${{ inputs.run_command }}

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Playwright tests FAILED on ${{ github.ref }} (run: ${{ github.run_id }})"
          echo "::error::Commit: ${{ github.sha }}"

      - name: CI Summary
        if: always()
        run: |
          set -euo pipefail
          COUNT=$(find . -type f -name '*.spec.js' | wc -l | tr -d ' ')
          {
            echo "## Playwright CI summary - ${{ inputs.summary_title }}"
            echo ""
            echo "- Repo: \`$GITHUB_REPOSITORY\`"
            echo "- Ref: \`$GITHUB_REF\`"
            echo "- SHA: \`$GITHUB_SHA\`"
            echo "- ENV: \`$ENV\` (generated \`env/dev.env\` at runtime)"
            echo "- Node: \`$(node -v)\`"
            echo "- NPM: \`$(npm -v)\`"
            echo ""
            echo "Generated specs: $COUNT"
            echo ""
            echo "Artifacts:"
            echo "- \`artifacts/test-output.txt\`"
            echo "- \`out/playwright-report/\`"
            echo "- \`out/test-results/\` (junit.xml, results.json, attachments)"
            echo "- \`out/perf/\` (if perf was run)"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload reports + logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: |
            artifacts/
            out/playwright-report/
            out/test-results/
            out/perf/
