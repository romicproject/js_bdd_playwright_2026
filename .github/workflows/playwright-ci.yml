name: Playwright CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      suite:
        description: "ui-smoke | ui-only | api-only | all | perf-smoke | perf-load | perf-ui"
        required: true
        default: "ui-smoke"
      project:
        description: "auto | UI Tests - Chromium | API Tests - Chromium"
        required: true
        default: "auto"
      grep:
        description: "optional --grep pattern (ex: @smoke)"
        required: false
        default: ""

concurrency:
  group: pw-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true

jobs:
  smoke:
    name: Smoke (${{ matrix.suite }})
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        suite: [api, ui]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/pw-setup
        with:
          api-base-url: ${{ vars.DEV_API_BASE_URL }}
          base-url: ${{ vars.DEV_BASE_URL }}
          api-key: ${{ secrets.DEV_API_KEY }}
          test-user-email: ${{ secrets.DEV_TEST_USER_EMAIL }}
          test-user-password: ${{ secrets.DEV_TEST_USER_PASSWORD }}

      - name: Quality gate
        run: npm run check:quality

      - name: Run smoke suite (${{ matrix.suite }})
        timeout-minutes: 30
        run: |
          if [ "${{ matrix.suite }}" = "api" ]; then
            npm run test:smoke -- --project "API Tests - Chromium" --workers=3
          else
            npm run test:ui:smoke:ci
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-smoke-${{ matrix.suite }}
          path: |
            artifacts/
            out/playwright-report/
            out/test-results/
            out/perf/
          retention-days: 14

  ci-gate:
    name: CI Gate
    if: always() && github.event_name != 'workflow_dispatch'
    needs: smoke
    runs-on: ubuntu-latest
    steps:
      - name: Assert smoke passed
        if: needs.smoke.result != 'success'
        run: exit 1

  manual:
    name: Manual (${{ inputs.suite }})
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/pw-setup
        with:
          api-base-url: ${{ vars.DEV_API_BASE_URL }}
          base-url: ${{ vars.DEV_BASE_URL }}
          api-key: ${{ secrets.DEV_API_KEY }}
          test-user-email: ${{ secrets.DEV_TEST_USER_EMAIL }}
          test-user-password: ${{ secrets.DEV_TEST_USER_PASSWORD }}

      - name: Quality gate
        run: npm run check:quality

      - name: Run suite (${{ inputs.suite }})
        timeout-minutes: 45
        env:
          SUITE: ${{ inputs.suite }}
          GREP_PATTERN: ${{ inputs.grep }}
          MANUAL_PROJECT: ${{ inputs.project }}
        run: |
          set -euo pipefail
          GREP_ARGS=()
          [ -n "$GREP_PATTERN" ] && GREP_ARGS=(--grep "$GREP_PATTERN")
          PROJECT_ARGS=()
          [ "$MANUAL_PROJECT" != "auto" ] && PROJECT_ARGS=(--project "$MANUAL_PROJECT")

          case "$SUITE" in
            ui-smoke)
              [ -n "$GREP_PATTERN" ] \
                && npm run test:dev -- --project "UI Tests - Chromium" "${GREP_ARGS[@]}" \
                || npm run test:ui:smoke:ci ;;
            ui-only)  npm run test:dev -- "${PROJECT_ARGS[@]:-"--project" "UI Tests - Chromium"}" "${GREP_ARGS[@]}" ;;
            api-only) npm run test:dev -- "${PROJECT_ARGS[@]:-"--project" "API Tests - Chromium"}" "${GREP_ARGS[@]}" ;;
            all)      npm run test:dev -- "${PROJECT_ARGS[@]}" "${GREP_ARGS[@]}" ;;
            perf-smoke) npm run perf:smoke ;;
            perf-load)  npm run perf:load ;;
            perf-ui)    npm run perf:ui ;;
            *) echo "Unknown suite: $SUITE"; exit 2 ;;
          esac

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-manual-${{ inputs.suite }}
          path: |
            artifacts/
            out/playwright-report/
            out/test-results/
            out/perf/
          retention-days: 7
