name: Playwright CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      suite:
        description: "ui-smoke | ui-only | api-only | all | perf-smoke | perf-load | perf-ui"
        required: true
        default: "ui-smoke"
      project:
        description: "auto | UI Tests - Chromium | API Tests - Chromium"
        required: true
        default: "auto"
      grep:
        description: "optional --grep pattern (ex: @smoke)"
        required: false
        default: ""

concurrency:
  group: pw-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true

# FIX #3: secrets defined once here, not duplicated as action inputs.
# The action receives them explicitly so the composite stays self-contained,
# but the source of truth is a single env block per workflow.

jobs:
  smoke:
    name: Smoke (${{ matrix.suite }})
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        suite: [api, ui]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/pw-setup
        with:
          api-base-url: ${{ vars.DEV_API_BASE_URL }}
          base-url: ${{ vars.DEV_BASE_URL }}
          api-key: ${{ secrets.DEV_API_KEY }}
          test-user-email: ${{ secrets.DEV_TEST_USER_EMAIL }}
          test-user-password: ${{ secrets.DEV_TEST_USER_PASSWORD }}

      - name: Run smoke – ${{ matrix.suite }}
        timeout-minutes: 30
        run: |
          if [ "${{ matrix.suite }}" = "api" ]; then
            npm run test:smoke -- --project "API Tests - Chromium" --workers=3
          else
            npm run test:ui:smoke:ci
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-smoke-${{ matrix.suite }}
          path: |
            artifacts/
            out/playwright-report/
            out/test-results/
            out/perf/
          retention-days: 14

  ci-gate:
    name: CI Gate
    if: always() && github.event_name != 'workflow_dispatch'
    needs: smoke
    runs-on: ubuntu-latest
    steps:
      - name: Assert smoke passed
        if: needs.smoke.result != 'success'
        run: exit 1

  manual:
    name: Manual – ${{ inputs.suite }}
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/pw-setup
        with:
          api-base-url: ${{ vars.DEV_API_BASE_URL }}
          base-url: ${{ vars.DEV_BASE_URL }}
          api-key: ${{ secrets.DEV_API_KEY }}
          test-user-email: ${{ secrets.DEV_TEST_USER_EMAIL }}
          test-user-password: ${{ secrets.DEV_TEST_USER_PASSWORD }}

      - name: Run suite – ${{ inputs.suite }}
        timeout-minutes: 45
        env:
          SUITE: ${{ inputs.suite }}
          GREP_PATTERN: ${{ inputs.grep }}
          # FIX #4: project input now wired into PROJECT_ARGS and used in every
          # relevant branch of the case statement.
          MANUAL_PROJECT: ${{ inputs.project }}
        run: |
          set -euo pipefail

          # Build optional flag arrays
          GREP_ARGS=()
          [ -n "$GREP_PATTERN" ] && GREP_ARGS=(--grep "$GREP_PATTERN")

          PROJECT_ARGS=()
          [ "$MANUAL_PROJECT" != "auto" ] && PROJECT_ARGS=(--project "$MANUAL_PROJECT")

          case "$SUITE" in
            ui-smoke)
              if [ -n "$GREP_PATTERN" ] || [ "${#PROJECT_ARGS[@]}" -gt 0 ]; then
                # Custom project or grep: run through test:dev so flags are respected
                npm run test:dev -- \
                  "${PROJECT_ARGS[@]:-"--project" "UI Tests - Chromium"}" \
                  "${GREP_ARGS[@]}"
              else
                npm run test:ui:smoke:ci
              fi
              ;;
            ui-only)
              npm run test:dev -- \
                "${PROJECT_ARGS[@]:-"--project" "UI Tests - Chromium"}" \
                "${GREP_ARGS[@]}"
              ;;
            api-only)
              npm run test:dev -- \
                "${PROJECT_ARGS[@]:-"--project" "API Tests - Chromium"}" \
                "${GREP_ARGS[@]}"
              ;;
            all)
              npm run test:dev -- "${PROJECT_ARGS[@]}" "${GREP_ARGS[@]}"
              ;;
            perf-smoke) npm run perf:smoke ;;
            perf-load)  npm run perf:load  ;;
            perf-ui)    npm run perf:ui    ;;
            *)
              echo "Unknown suite: $SUITE"; exit 2
              ;;
          esac

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-manual-${{ inputs.suite }}
          path: |
            artifacts/
            out/playwright-report/
            out/test-results/
            out/perf/
          retention-days: 7

  # FIX #5: gate for manual runs — workflow fails visibly if the suite fails.
  # Remove this job if manual runs are purely exploratory and result is irrelevant.
  manual-gate:
    name: Manual Gate
    if: always() && github.event_name == 'workflow_dispatch'
    needs: manual
    runs-on: ubuntu-latest
    steps:
      - name: Assert manual run passed
        if: needs.manual.result != 'success'
        run: exit 1
