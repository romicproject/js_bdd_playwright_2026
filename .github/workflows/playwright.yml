name: Playwright (DEV) CI

on:
  pull_request:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: pw-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      CI: true
      ENV: dev
      LOG_RUN_ID: ${{ github.run_id }}

      # secrets
      API_KEY: ${{ secrets.DEV_API_KEY }}
      TEST_USER_EMAIL: ${{ secrets.DEV_TEST_USER_EMAIL }}
      TEST_USER_PASSWORD: ${{ secrets.DEV_TEST_USER_PASSWORD }}

      # vars (or make these secrets if vars aren't available)
      BASE_URL: ${{ vars.DEV_BASE_URL }}
      API_BASE_URL: ${{ vars.DEV_API_BASE_URL }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Create DEV env file (do not print values)
        run: |
          set -euo pipefail
          mkdir -p config/env

          # Hard fail early if required values are missing
          test -n "${API_BASE_URL:-}" || (echo "Missing API_BASE_URL" && exit 2)

          cat > "config/env/dev.env" <<EOF
          BASE_URL=${BASE_URL:-}
          API_BASE_URL=${API_BASE_URL:-}
          REQUEST_TIMEOUT=10000
          GLOBAL_TIMEOUT=30000
          RETRY_FAILED_TESTS=0
          MAX_RETRIES=2
          DEBUG_MODE=false
          VERBOSE_LOGGING=false
          API_KEY=${API_KEY:-}
          TEST_USER_EMAIL=${TEST_USER_EMAIL:-}
          TEST_USER_PASSWORD=${TEST_USER_PASSWORD:-}
          EOF

      - name: Prepare artifacts folder
        run: mkdir -p artifacts

      - name: Run tests (UI smoke CI)
        run: |
          set -euo pipefail
          npm run test:ui:smoke:ci 2>&1 | tee artifacts/test-output.txt

      - name: Upload reports + logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            artifacts/
            out/playwright-report/
            out/test-results/
            out/perf/