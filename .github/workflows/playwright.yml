name: Playwright (DEV) CI

on:
  pull_request:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      suite:
        description: "What to run"
        required: true
        default: "ui-smoke"
        type: choice
        options:
          - ui-smoke
          - ui-only
          - api-only
          - all
          - perf-smoke
          - perf-load
          - perf-ui
      project:
        description: "Playwright project (ignored for perf; auto chooses based on suite)"
        required: true
        default: "auto"
        type: choice
        options:
          - auto
          - UI Tests - Chromium
          - API Tests - Chromium
      grep:
        description: "Optional: Playwright --grep pattern (e.g. @smoke or @ui.*@smoke|@smoke.*@ui)"
        required: false
        default: ""

concurrency:
  group: pw-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      CI: true
      ENV: dev
      LOG_RUN_ID: ${{ github.run_id }}

      # Secrets
      API_KEY: ${{ secrets.DEV_API_KEY }}
      TEST_USER_EMAIL: ${{ secrets.DEV_TEST_USER_EMAIL }}
      TEST_USER_PASSWORD: ${{ secrets.DEV_TEST_USER_PASSWORD }}

      # Variables (move to secrets if you prefer)
      BASE_URL: ${{ vars.DEV_BASE_URL }}
      API_BASE_URL: ${{ vars.DEV_API_BASE_URL }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Create DEV env file (do not print values)
        run: |
          set -euo pipefail
          mkdir -p config/env
          test -n "${API_BASE_URL:-}" || (echo "Missing DEV_API_BASE_URL / API_BASE_URL" && exit 2)

          cat > "config/env/dev.env" <<EOF
          BASE_URL=${BASE_URL:-}
          API_BASE_URL=${API_BASE_URL:-}
          REQUEST_TIMEOUT=10000
          GLOBAL_TIMEOUT=30000
          RETRY_FAILED_TESTS=0
          MAX_RETRIES=2
          DEBUG_MODE=false
          VERBOSE_LOGGING=false
          API_KEY=${API_KEY:-}
          TEST_USER_EMAIL=${TEST_USER_EMAIL:-}
          TEST_USER_PASSWORD=${TEST_USER_PASSWORD:-}
          EOF

      - name: Prepare artifacts folder
        run: mkdir -p artifacts

      - name: Generate BDD specs
        run: |
          set -euo pipefail
          npm run bdd:generate

      - name: Validate generated specs exist
        run: |
          set -euo pipefail
          COUNT="$(find . -type f -name "*.spec.js" | wc -l | tr -d ' ')"
          echo "Found spec files: $COUNT"
          if [ "$COUNT" -eq 0 ]; then
            echo "No *.spec.js files found after bdd:generate."
            exit 3
          fi

      # Default behavior for PR/push: stable & fast
      - name: Run tests (PR/push default: UI smoke)
        if: ${{ github.event_name != 'workflow_dispatch' }}
        run: |
          set -euo pipefail
          npm run test:ui:smoke:ci 2>&1 | tee artifacts/test-output.txt

      # Manual runner with suite/project/grep
      - name: Run tests (manual)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          set -euo pipefail

          SUITE="${{ inputs.suite }}"
          PROJECT_INPUT="${{ inputs.project }}"
          GREP_INPUT="${{ inputs.grep }}"

          echo "SUITE=$SUITE" | tee artifacts/selected.txt
          echo "PROJECT_INPUT=$PROJECT_INPUT" | tee -a artifacts/selected.txt
          echo "GREP_INPUT=$GREP_INPUT" | tee -a artifacts/selected.txt

          # Decide project automatically if requested
          PROJECT=""
          if [ "$PROJECT_INPUT" = "auto" ]; then
            case "$SUITE" in
              api-only) PROJECT="API Tests - Chromium" ;;
              ui-smoke|ui-only|all) PROJECT="UI Tests - Chromium" ;;
              perf-*) PROJECT="" ;; # perf doesn't use Playwright project selection here
              *) PROJECT="UI Tests - Chromium" ;;
            esac
          else
            PROJECT="$PROJECT_INPUT"
          fi

          # Build optional grep args
          GREP_ARGS=""
          if [ -n "$GREP_INPUT" ]; then
            GREP_ARGS="--grep=$GREP_INPUT"
          fi

          case "$SUITE" in
            ui-smoke)
              # Use your CI-tuned script by default; override grep if provided
              if [ -n "$GREP_INPUT" ]; then
                cross-env ENV=dev playwright test --project "UI Tests - Chromium" $GREP_ARGS --workers=3 2>&1 | tee artifacts/test-output.txt
              else
                npm run test:ui:smoke:ci 2>&1 | tee artifacts/test-output.txt
              fi
              ;;
            ui-only)
              cross-env ENV=dev playwright test --project "${PROJECT:-UI Tests - Chromium}" $GREP_ARGS 2>&1 | tee artifacts/test-output.txt
              ;;
            api-only)
              cross-env ENV=dev playwright test --project "${PROJECT:-API Tests - Chromium}" $GREP_ARGS 2>&1 | tee artifacts/test-output.txt
              ;;
            all)
              # Runs env-based script; you can still pass grep to narrow
              # If you want grep to apply here, we run playwright directly instead of npm script:
              if [ -n "$GREP_INPUT" ]; then
                cross-env ENV=dev playwright test $GREP_ARGS 2>&1 | tee artifacts/test-output.txt
              else
                npm run test:dev 2>&1 | tee artifacts/test-output.txt
              fi
              ;;
            perf-smoke)
              npm run perf:smoke 2>&1 | tee artifacts/test-output.txt
              ;;
            perf-load)
              npm run perf:load 2>&1 | tee artifacts/test-output.txt
              ;;
            perf-ui)
              npm run perf:ui 2>&1 | tee artifacts/test-output.txt
              ;;
            *)
              echo "Unknown suite: $SUITE"
              exit 2
              ;;
          esac

      - name: CI Summary
        if: always()
        run: |
          set -euo pipefail
          COUNT=$(find . -type f -name '*.spec.js' | wc -l | tr -d ' ')
          {
            echo "## Playwright CI summary"
            echo ""
            echo "- Repo: \`$GITHUB_REPOSITORY\`"
            echo "- Ref: \`$GITHUB_REF\`"
            echo "- SHA: \`$GITHUB_SHA\`"
            echo "- ENV: \`$ENV\` (generated \`config/env/dev.env\` at runtime)"
            echo "- Node: \`$(node -v)\`"
            echo "- NPM: \`$(npm -v)\`"
            echo ""
<<<<<<< romicproject-patch-2
            echo "Generated specs: $(find . -type f -name "*.spec.js" | wc -l | tr -d ' ')"
=======
            echo "Generated specs: $COUNT"
>>>>>>> main
            echo ""
            echo "Artifacts:"
            echo "- \`artifacts/test-output.txt\`"
            echo "- \`out/playwright-report/\`"
            echo "- \`out/test-results/\`"
            echo "- \`out/perf/\` (if perf was run)"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload reports + logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            artifacts/
            out/playwright-report/
            out/test-results/
            out/perf/
