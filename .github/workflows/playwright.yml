name: Playwright CI
# This workflow runs Playwright tests on pull requests and pushes to main, with a manual trigger option.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      suite:
        description: "ui-smoke | ui-only | api-only | all | perf-smoke | perf-load | perf-ui"
        required: true
        default: "ui-smoke"
      project:
        description: "auto | UI Tests - Chromium | API Tests - Chromium"
        required: true
        default: "auto"
      grep:
        description: "optional --grep pattern (ex: @smoke)"
        required: false
        default: ""

concurrency:
  group: pw-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  ENV: dev
  LOG_RUN_ID: ${{ github.run_id }}
  API_KEY: ${{ secrets.DEV_API_KEY }}
  TEST_USER_EMAIL: ${{ secrets.DEV_TEST_USER_EMAIL }}
  TEST_USER_PASSWORD: ${{ secrets.DEV_TEST_USER_PASSWORD }}
  BASE_URL: ${{ vars.DEV_BASE_URL }}
  API_BASE_URL: ${{ vars.DEV_API_BASE_URL }}

jobs:
  smoke:
    name: Smoke (${{ matrix.suite }})
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        suite: [api, ui]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-chromium-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: pw-chromium-${{ runner.os }}-

      - name: Install Playwright (full)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps only
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Create env file
        run: |
          set -euo pipefail
          mkdir -p env artifacts
          : "${API_BASE_URL:?Missing DEV_API_BASE_URL}"
          cat > env/dev.env <<EOF
          BASE_URL=${BASE_URL:-}
          API_BASE_URL=${API_BASE_URL}
          REQUEST_TIMEOUT=10000
          GLOBAL_TIMEOUT=30000
          RETRY_FAILED_TESTS=0
          MAX_RETRIES=2
          DEBUG_MODE=false
          VERBOSE_LOGGING=false
          API_KEY=${API_KEY:-}
          TEST_USER_EMAIL=${TEST_USER_EMAIL:-}
          TEST_USER_PASSWORD=${TEST_USER_PASSWORD:-}
          EOF

      - name: Generate BDD specs
        run: |
          set -euo pipefail
          npm run bdd:generate
          COUNT=$(find . -type f -name "*.spec.js" | wc -l | tr -d ' ')
          echo "Spec files found: $COUNT"
          [[ "$COUNT" -gt 0 ]] || { echo "No spec files generated!"; exit 1; }

      - name: Run smoke – ${{ matrix.suite }}
        timeout-minutes: 30
        run: |
          set -euo pipefail
          if [ "${{ matrix.suite }}" = "api" ]; then
            npx playwright test --project "API Tests - Chromium" --grep @smoke --workers=3
          else
            npm run test:ui:smoke:ci
          fi

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke-${{ matrix.suite }}
          path: |
            artifacts/
            out/playwright-report/
            out/test-results/
            out/perf/
          retention-days: 14

  # Gate job pentru branch protection rules
  ci-gate:
    name: CI Gate
    if: always() && github.event_name != 'workflow_dispatch'
    needs: smoke
    runs-on: ubuntu-latest
    steps:
      - name: Check smoke results
        if: needs.smoke.result != 'success'
        run: |
          echo "Smoke tests failed or were cancelled (result: ${{ needs.smoke.result }})"
          exit 1

  manual:
    name: Manual – ${{ inputs.suite }}
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-chromium-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: pw-chromium-${{ runner.os }}-

      - name: Install Playwright (full)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps only
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Create env file
        run: |
          set -euo pipefail
          mkdir -p env artifacts
          : "${API_BASE_URL:?Missing DEV_API_BASE_URL}"
          cat > env/dev.env <<EOF
          BASE_URL=${BASE_URL:-}
          API_BASE_URL=${API_BASE_URL}
          REQUEST_TIMEOUT=10000
          GLOBAL_TIMEOUT=30000
          RETRY_FAILED_TESTS=0
          MAX_RETRIES=2
          DEBUG_MODE=false
          VERBOSE_LOGGING=false
          API_KEY=${API_KEY:-}
          TEST_USER_EMAIL=${TEST_USER_EMAIL:-}
          TEST_USER_PASSWORD=${TEST_USER_PASSWORD:-}
          EOF

      - name: Generate BDD specs
        run: |
          set -euo pipefail
          npm run bdd:generate
          COUNT=$(find . -type f -name "*.spec.js" | wc -l | tr -d ' ')
          echo "Spec files found: $COUNT"
          [[ "$COUNT" -gt 0 ]] || { echo "No spec files generated!"; exit 1; }

      - name: Run suite – ${{ inputs.suite }}
        timeout-minutes: 45
        env:
          SUITE: ${{ inputs.suite }}
          PROJECT_INPUT: ${{ inputs.project }}
          GREP_PATTERN: ${{ inputs.grep }}
        run: |
          set -euo pipefail

          PROJECT="$PROJECT_INPUT"
          [ "$PROJECT" = "auto" ] && PROJECT="UI Tests - Chromium"
          [ "$SUITE" = "api-only" ] && [ "$PROJECT_INPUT" = "auto" ] && PROJECT="API Tests - Chromium"

          # Grep sigur — array bash, nu interpolat direct în comandă
          GREP_ARGS=()
          [ -n "$GREP_PATTERN" ] && GREP_ARGS=(--grep "$GREP_PATTERN")

          case "$SUITE" in
            ui-smoke)
              if [ -n "$GREP_PATTERN" ]; then
                npx playwright test --project "UI Tests - Chromium" "${GREP_ARGS[@]}" --workers=3
              else
                npm run test:ui:smoke:ci
              fi
              ;;
            ui-only|api-only)
              npx playwright test --project "$PROJECT" "${GREP_ARGS[@]}"
              ;;
            all)
              if [ -n "$GREP_PATTERN" ]; then
                npx playwright test "${GREP_ARGS[@]}"
              else
                npm run test:dev
              fi
              ;;
            perf-smoke) npm run perf:smoke ;;
            perf-load)  npm run perf:load  ;;
            perf-ui)    npm run perf:ui    ;;
            *)
              echo "Unknown suite: $SUITE"
              exit 2
              ;;
          esac

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-manual-${{ inputs.suite }}
          path: |
            artifacts/
            out/playwright-report/
            out/test-results/
            out/perf/
          retention-days: 7
