name: Playwright (DEV) CI 

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      suite:
        description: "suite: ui-smoke | ui-only | api-only | all | perf-smoke | perf-load | perf-ui"
        required: true
        default: "ui-smoke"
      project:
        description: "project: auto | UI Tests - Chromium | API Tests - Chromium"
        required: true
        default: "auto"
      grep:
        description: "optional --grep pattern (e.g. @smoke or @ui.*@smoke|@smoke.*@ui)"
        required: false
        default: ""

concurrency:
  group: pw-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    if: ${{ github.event_name != 'workflow_dispatch' }}
    strategy:
      fail-fast: false
      matrix:
        suite: [api, ui]
    uses: ./.github/workflows/playwright-reusable.yml
    secrets: inherit
    with:
      summary_title: smoke-${{ matrix.suite }}
      artifact_name: playwright-artifacts-${{ matrix.suite }}
      test_timeout_minutes: 30
      run_command: |
        set -euo pipefail
        if [ "${{ matrix.suite }}" = "api" ]; then
          cross-env ENV=dev playwright test --project "API Tests - Chromium" --grep @smoke --workers=3 2>&1 | tee artifacts/test-output.txt
        else
          npm run test:ui:smoke:ci 2>&1 | tee artifacts/test-output.txt
        fi

  workflow-dispatch:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    uses: ./.github/workflows/playwright-reusable.yml
    secrets: inherit
    with:
      summary_title: manual-dispatch
      artifact_name: playwright-artifacts-manual
      test_timeout_minutes: 45
      run_command: |
        set -euo pipefail
        SUITE="${{ inputs.suite }}"
        PROJECT_INPUT="${{ inputs.project }}"
        GREP_INPUT="${{ inputs.grep }}"
        echo "SUITE=$SUITE" | tee artifacts/selected.txt
        echo "PROJECT_INPUT=$PROJECT_INPUT" | tee -a artifacts/selected.txt
        echo "GREP_INPUT=$GREP_INPUT" | tee -a artifacts/selected.txt
        PROJECT=""
        if [ "$PROJECT_INPUT" = "auto" ]; then
          case "$SUITE" in
            api-only) PROJECT="API Tests - Chromium" ;;
            *) PROJECT="UI Tests - Chromium" ;;
          esac
        else
          PROJECT="$PROJECT_INPUT"
        fi
        GREP_ARGS=""
        if [ -n "$GREP_INPUT" ]; then
          GREP_ARGS="--grep=$GREP_INPUT"
        fi
        case "$SUITE" in
          ui-smoke)
            if [ -n "$GREP_INPUT" ]; then
              cross-env ENV=dev playwright test --project "UI Tests - Chromium" $GREP_ARGS --workers=3 2>&1 | tee artifacts/test-output.txt
            else
              npm run test:ui:smoke:ci 2>&1 | tee artifacts/test-output.txt
            fi
            ;;
          ui-only)
            cross-env ENV=dev playwright test --project "${PROJECT:-UI Tests - Chromium}" $GREP_ARGS 2>&1 | tee artifacts/test-output.txt
            ;;
          api-only)
            cross-env ENV=dev playwright test --project "${PROJECT:-API Tests - Chromium}" $GREP_ARGS 2>&1 | tee artifacts/test-output.txt
            ;;
          all)
            if [ -n "$GREP_INPUT" ]; then
              cross-env ENV=dev playwright test $GREP_ARGS 2>&1 | tee artifacts/test-output.txt
            else
              npm run test:dev 2>&1 | tee artifacts/test-output.txt
            fi
            ;;
          perf-smoke)
            npm run perf:smoke 2>&1 | tee artifacts/test-output.txt
            ;;
          perf-load)
            npm run perf:load 2>&1 | tee artifacts/test-output.txt
            ;;
          perf-ui)
            npm run perf:ui 2>&1 | tee artifacts/test-output.txt
            ;;
          *)
            echo "Unknown suite: $SUITE"
            exit 2
            ;;
        esac
