name: Playwright Setup
description: "Node install + optional Playwright browser setup + env file + optional BDD generate"

inputs:
  api-base-url:
    required: true
  base-url:
    required: false
    default: ""
  api-key:
    required: false
    default: ""
  test-user-email:
    required: false
    default: ""
  test-user-password:
    required: false
    default: ""
  node-version:
    required: false
    default: "20"
  install-browser:
    required: false
    default: "true"
  generate-bdd:
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: npm

    - run: npm ci
      shell: bash

    - name: Cache Playwright browsers
      id: pw-cache
      if: ${{ inputs.install-browser == 'true' }}
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: pw-chromium-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
        restore-keys: pw-chromium-${{ runner.os }}-

    # FIX #2: consolidated into one step — clearer intent, same behaviour.
    # cache-hit=true  → binaries restored by actions/cache; only system deps needed.
    # cache-hit=false → full install (binaries + system deps).
    - name: Install Playwright browser
      if: ${{ inputs.install-browser == 'true' }}
      shell: bash
      run: |
        if [ "${{ steps.pw-cache.outputs.cache-hit }}" = "true" ]; then
          npx playwright install-deps chromium
        else
          npx playwright install --with-deps chromium
        fi

    # FIX #1: printf per-line — no heredoc indentation bleed into the .env file.
    - name: Create env file
      shell: bash
      env:
        API_BASE_URL: ${{ inputs.api-base-url }}
        BASE_URL: ${{ inputs.base-url }}
        API_KEY: ${{ inputs.api-key }}
        TEST_USER_EMAIL: ${{ inputs.test-user-email }}
        TEST_USER_PASSWORD: ${{ inputs.test-user-password }}
      run: |
        set -euo pipefail
        : "${API_BASE_URL:?Missing api-base-url}"
        mkdir -p env artifacts
        {
          printf 'BASE_URL=%s\n'              "${BASE_URL:-}"
          printf 'API_BASE_URL=%s\n'          "${API_BASE_URL}"
          printf 'REQUEST_TIMEOUT=%s\n'       "10000"
          printf 'GLOBAL_TIMEOUT=%s\n'        "30000"
          printf 'RETRY_FAILED_TESTS=%s\n'    "0"
          printf 'MAX_RETRIES=%s\n'           "2"
          printf 'DEBUG_MODE=%s\n'            "false"
          printf 'VERBOSE_LOGGING=%s\n'       "false"
          printf 'API_KEY=%s\n'              "${API_KEY:-}"
          printf 'TEST_USER_EMAIL=%s\n'       "${TEST_USER_EMAIL:-}"
          printf 'TEST_USER_PASSWORD=%s\n'    "${TEST_USER_PASSWORD:-}"
        } > env/dev.env

    - name: Generate BDD specs
      if: ${{ inputs.generate-bdd == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        npm run bdd:generate
        COUNT=$(find . -type f -name "*.spec.js" | wc -l | tr -d ' ')
        echo "Spec files found: $COUNT"
        [[ "$COUNT" -gt 0 ]] || { echo "No spec files generated!"; exit 1; }
