x-test-base: &test-base
  image: lrnapi-tests:${TEST_IMAGE_TAG:-latest}
  build:
    context: .
    dockerfile: Dockerfile
  init: true
  volumes:
    - ./out/playwright-report:/app/out/playwright-report
    - ./out/test-results:/app/out/test-results

services:
  tests-dev:
    <<: *test-base
    environment:
      - ENV=dev
    env_file:
      - env/dev.env
    command: sh -lc "npm run bdd:generate && npm run test:dev"
    profiles: ["dev"]

  tests-staging:
    <<: *test-base
    environment:
      - ENV=staging
    env_file:
      - env/staging.env
    command: sh -lc "npm run bdd:generate && npm run test:staging"
    profiles: ["staging"]

  tests-prod:
    <<: *test-base
    environment:
      - ENV=prod
    env_file:
      - env/prod.env
    command: sh -lc "npm run bdd:generate && npm run test:prod"
    profiles: ["prod"]
